services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - hydroguide-data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/hydroguide.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - DEBUG=true
    restart: unless-stopped

volumes:
  hydroguide-data:
    driver: local
